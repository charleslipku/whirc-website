# ══════════════════════════════════════════════════════════════
#  News 自动抓取配置 —— 团队成员可直接在 GitHub 网页上编辑本文件
#
#  规则：新闻的「标题或摘要」命中 include 中任一关键词（不区分
#  大小写）即被收录；再命中 exclude 中任一关键词则被剔除。
#  修改保存 (commit) 后，下一次定时抓取自动生效。
# ══════════════════════════════════════════════════════════════

include:
  - "women's health"
  - "women health"
  - "womens health"
  - "maternal health"
  - "maternal mortality"
  - "reproductive health"
  - "pregnancy"
  - "menopause"
  - "breast cancer"
  - "cervical cancer"
  - "ovarian"
  - "gendered racism"
  - "WHIRC"
  - "Marie Thoma"
  - "Jioni Lewis"
  - "Alisa Clyne"
  - "Ang Li"

exclude: []
  # 例：出现误报时加关键词，如
  # - "athletics"

# ── 数据源（enabled: false 可临时停用某个源）──────────────
sources:
  # ── umd-topic 类型：Maryland Today 编辑策划的专题页 ──
  # 条目由编辑人工归类（天然相关），不做 include 关键词过滤，
  # 仍应用 exclude 与 min_date
  - id: mt-womens-health
    name: "Maryland Today · Women's Health"
    type: umd-topic
    url: "https://today.umd.edu/topic/womens-health"
    enabled: true

  - id: maryland-today
    name: "Maryland Today"
    type: rss
    url: "https://today.umd.edu/rss"
    enabled: true
  - id: sph
    name: "School of Public Health"
    type: rss
    url: "https://sph.umd.edu/rss.xml"
    enabled: true
  - id: engineering
    name: "Clark School of Engineering"
    type: rss
    url: "https://eng.umd.edu/rss.xml"
    enabled: true
  - id: education
    name: "College of Education"
    type: rss
    url: "https://education.umd.edu/rss.xml"
    enabled: true
  - id: umd-news
    name: "UMD News"
    type: rss
    url: "https://news.umd.edu/rss.xml"
    enabled: false   # ⚠️ news.umd.edu 域名不存在（2026-07 验证）；UMD 主新闻源即上方 Maryland Today

  # ── newsengine 类型：Clark School 新闻引擎全文搜索 API ──
  # ECE/BIOE 无新闻 RSS；此类型对每个 include 关键词做全文检索，
  # 覆盖整个新闻库（不限于最新几条）。url 为 API 基址，
  # article_base 为文章链接前缀。
  - id: ece
    name: "Electrical & Computer Engineering"
    type: newsengine
    url: "https://mnemosyne.umd.edu/tomcat/newsengine/ece/version2"
    article_base: "https://ece.umd.edu/news/story/"
    enabled: true
  - id: bioe
    name: "Fischell Department of Bioengineering"
    type: newsengine
    url: "https://mnemosyne.umd.edu/tomcat/newsengine/bioe/version2"
    article_base: "https://bioe.umd.edu/news/story/"
    enabled: true

# 归档中最多保留的条数（超出后最旧的被移除）
max_items: 100

# 只收录此日期之后发布的新闻（WHIRC 立项时间；newsengine 源会全文
# 搜索整个历史新闻库，没有这个限制会抓进立项前的旧新闻）
min_date: "2026-01-01"
